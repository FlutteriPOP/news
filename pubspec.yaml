name: whack
description: "A production-ready Hacker News client."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.11.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  dio: ^5.9.2
  freezed_annotation: ^3.1.0
  json_annotation: ^4.11.0
  url_launcher: ^6.3.2
  dartz: ^0.10.1
  flutter_widget_from_html: ^0.17.1
  intl: ^0.20.2
  equatable: ^2.0.8
  shadcn_ui: ^0.52.3
  flutter_lints: ^6.0.0
  flutter_dotenv: ^6.0.0

dev_dependencies:
  build_runner: ^2.13.1
  freezed: ^3.2.5
  json_serializable: ^6.13.0
  riverpod_generator: ^4.0.3

flutter:
  uses-material-design: true
  assets:
    - .env
